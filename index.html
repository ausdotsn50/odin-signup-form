<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <main id="container">
        <div id="logo">
            <div>
                <img class="logo img" src="assets/odin-logo.png" alt="Odin Logo">
                <p class="logo text">Odin</p>
            </div>
        </div>

        <div>
            <p>
                This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>

            <form action="">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name">

                <label for="last_name">Last Name</label>
                <input type="text" id="last_name">

                <label for="email">Email</label>
                <input type="email" id="email">

                <label for="phone_number">Phone Number</label>
                <input type="number" id="phone_number">

                <label for="password"></label>
                <input type="password" id="password">

                <label for="confirm_pw"></label>
                <input type="password" id="confirm_pw">
            </form>

            <button type="submit">Create Account</button>

            <p>Already have an account? <span>Log in</span></p>
        </div>
    </main>

    

    
    
    <!-- Trademark footer here -->
    <footer></footer>
</body>
</html>
