<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://raw.githubusercontent.com/ausdotsn50/odin-recipes/main/images/odin.png">
    <script src="script.js"></script>
</head>
<body>
    <main id="container">
        <div id="logo">
            <div>
                <img class="logo img" src="assets/odin-logo.png" alt="Odin Logo">
                <p class="logo text">Odin</p>
            </div>
        </div>

        <div id="forms">
            <div>
                <p>
                    This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up <em>now</em> to get started.
                </p>
                <p>You <em>know</em> you want to.</p>
            </div>
            
            <form action="/" method="POST" id="create-acc">
                <legend>Let's do this!</legend>

                <section>
                    <div>
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    
                    <div>
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                </section>
                
                <section>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>
                    
                    <div>
                        <label for="phone_number">Phone Number</label>
                        <input type="number" id="phone_number" name="phone_number">
                    </div>
                </section>
                
                <section>
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" minlength="8">
                    </div>
                    
                    <div>
                        <label for="confirm_pw">Confirm Password</label>
                        <input type="password" id="confirm_pw" name="confirm_pw" minlength="8">
                    </div>
                </section>
                
            </form>
            
            <div>
                <div>
                    <button form="create-acc" type="submit">Create Account</button>
                </div>
                <p>Already have an account? <a href="">Log in</a></p>
            </div>
        </div>
    </main>

    <footer>
        <a href="https://github.com/ausdotsn50/odin-signup-form" target="__blank"><img id="footer-icon" src="https://raw.githubusercontent.com/ausdotsn50/odin-recipes/main/images/github.svg" alt="github-icon"></a>
        <p><strong>ausdotsn50</strong></p>
    </footer>
</body>
</html>
